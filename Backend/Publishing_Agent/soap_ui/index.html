<!DOCTYPE html>
<html>
<head>
  <title>MedAssist SOAP Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header">
    <h2>MedAssist Clinical Record</h2>
    <p>SOAP Medical Document</p>
  </div>

  <button class="generate-btn" onclick="generateSOAP()">Generate SOAP</button>

  <div id="doc" class="card hidden"></div>

  <div id="actions" class="actions hidden">
    <button class="decline" onclick="decline()">Decline</button>
    <button class="approve" onclick="approve()">✔ Approve</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
